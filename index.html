<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Guitar Score Editor</title>
  <style>
    :root{font-family:Inter,Pretendard,"Noto Sans KR",sans-serif;color:#172033;background:#eef1f6}
    *{box-sizing:border-box} body{margin:0} button,input,select{font:inherit}
    header{position:sticky;top:0;z-index:5;background:#172033;color:#fff;padding:10px 16px;box-shadow:0 2px 10px #0003}
    .top,.toolbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;max-width:1200px;margin:auto}
    .brand{font-weight:800;margin-right:auto}.top input{width:150px;padding:6px 8px;border:1px solid #64748b;border-radius:5px;background:#fff;color:#111}
    .toolbar{margin-top:8px}.toolbar button,.toolbar select,.file-label{border:1px solid #526078;background:#26344e;color:#fff;border-radius:5px;padding:6px 9px;cursor:pointer}
    .toolbar button:hover,.toolbar button.active,.file-label:hover{background:#315ca8}.toolbar .danger:hover{background:#a83030}
    .sep{width:1px;height:25px;background:#63708a;margin:0 2px}.file-label input{display:none}
    main{padding:22px 10px 60px}.sheet{position:relative;margin:auto;background:#fff;box-shadow:0 4px 24px #26344e33;min-height:297mm;width:210mm;padding:15mm 12mm;overflow:hidden}
    .sheet[data-page="A3"]{width:297mm;min-height:420mm}.sheet[data-page="Letter"]{width:216mm;min-height:279mm}.sheet[data-page="Screen"]{width:min(1180px,96vw);min-height:700px}
    .score-title{text-align:center;margin:0;font-family:serif;font-size:28px;min-height:34px}.credits{display:flex;justify-content:space-between;min-height:25px;font-family:serif}
    #score{width:100%;display:block;overflow:visible}.staff-line,.ledger-line,.tab-line,.barline{stroke:#222;stroke-width:1}.ledger-line{stroke-width:1.2}.tab-line{stroke-width:.8}.notehead{fill:#111}.voice-1 .notehead{fill:#2368c4}.voice-2 .notehead{fill:#b33a3a}.voice-3 .notehead{fill:#15805f}
    .inactive-voice{opacity:.46}.selected .notehead,.selected .stem{filter:drop-shadow(0 0 2px #f59e0b);stroke:#f59e0b;stroke-width:2}.stem{stroke:#111;stroke-width:1.3}
    .tab-bg{fill:#fff;stroke:none}.tab-number{font:700 14px Arial;text-anchor:middle;dominant-baseline:middle;user-select:none}.tab-voice-1 .tab-number{fill:#2368c4}.tab-voice-2 .tab-number{fill:#b33a3a}.tab-voice-3 .tab-number{fill:#15805f}.selected .tab-bg{fill:#fff2b8}.hit{fill:transparent;cursor:pointer}.measure-hit{fill:transparent;cursor:pointer}.selected-measure{fill:#e8f1ff;opacity:.55}
    .break-mark{fill:#315ca8;font-size:11px}.slur,.tie{fill:none;stroke:#222;stroke-width:1.5}.barre{fill:none;stroke:#222;stroke-width:1.2;stroke-dasharray:5 4}.annotation-text{font:italic 13px serif}.rest{font:20px serif;text-anchor:middle}.status{max-width:1200px;margin:10px auto;color:#536078;font-size:13px}
    dialog{border:0;border-radius:10px;box-shadow:0 10px 40px #0005;max-width:430px}dialog::backdrop{background:#0006}dialog button{padding:7px 12px}
    @media(max-width:850px){.sheet{width:100%;min-height:0;padding:25px 12px}.top input{width:105px}.brand{width:100%}}
    @media print{header,.status,dialog{display:none!important}body,main{background:#fff;padding:0}.sheet{box-shadow:none;margin:0;width:100%!important;min-height:0!important;padding:12mm}}
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div class="brand">Guitar Score Editor</div>
      <input id="title" placeholder="제목" aria-label="제목">
      <input id="lyricist" placeholder="작사" aria-label="작사">
      <input id="composer" placeholder="작곡" aria-label="작곡">
    </div>
    <div class="toolbar">
      <button data-duration="32">온음표</button><button data-duration="16">2분</button><button data-duration="8" class="active">4분</button><button data-duration="4">8분</button><button data-duration="2">16분</button>
      <button id="dot" title="점음표">.</button><button id="rest">쉼표</button><button id="voice">V1</button>
      <span class="sep"></span><button id="tie">타이</button><button id="slur">슬러</button><button id="grace">꾸밈음</button><button id="barre">바레</button>
      <span class="sep"></span><button id="undo">실행 취소</button><button id="clear" class="danger">전체 지우기</button>
      <select id="instrument" title="악기"><option value="classical-guitar">클래식 기타</option><option value="acoustic-guitar">통기타</option><option value="electric-guitar">일렉 기타</option><option value="piano">피아노</option></select>
      <select id="page" title="페이지 크기"><option>A4</option><option>A3</option><option>Letter</option><option>Screen</option></select>
      <button id="xmlExport">MusicXML 내보내기</button><label class="file-label">MusicXML 불러오기<input id="xmlImport" type="file" accept=".xml,.musicxml,application/xml"></label><button id="pdf">PDF 저장</button><button id="help">사용법</button>
    </div>
  </header>
  <main>
    <article class="sheet" id="sheet" data-page="A4">
      <h1 class="score-title" id="printTitle"></h1><div class="credits"><span id="printLyricist"></span><span id="printComposer"></span></div>
      <svg id="score" role="img" aria-label="오선 및 타브 악보 편집 영역"></svg>
    </article>
    <div class="status" id="status">빈 마디를 클릭한 뒤 키보드 A–G로 음표를 입력하세요. TAB 숫자를 클릭하면 바로 편집할 수 있습니다.</div>
  </main>
  <dialog id="helpDialog"><h3>키보드 입력</h3><p>A–G(한글 입력 상태에서도 물리 키 기준): 음표 입력 · . : 점음표 켜기/끄기 · 숫자: 선택한 TAB 프렛 변경 · ←/→: 음표 이동 · ↑/↓: 같은 음을 다른 줄로 이동 · Enter: 선택 마디 다음에서 줄바꿈 · V: 성부 전환 · Delete: 삭제 · Shift+클릭: 범위 선택</p><button autofocus>닫기</button></dialog>
  <script type="module" src="./editor.js"></script>
</body>
</html>
